name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install dependencies. If requirements.txt exists, install it.
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install ruff

    - name: Lint and Format check with Ruff
      run: |
        ruff check .
        ruff format --check .

    - name: Run test suite
      run: |
        # Run test suites with mocked embeddings/models since heavy models shouldn't download in CI
        python -m unittest discover -s . -p "test_*.py"
