<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen Chat - AI with Memory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-container {
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: #343a40;
            color: white;
        }

        .sidebar-header h3 {
            margin-bottom: 10px;
        }

        .new-chat-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .new-chat-btn:hover {
            background: #0056b3;
        }

        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .session-item {
            padding: 12px;
            margin-bottom: 5px;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #e9ecef;
        }

        .session-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .session-item.active {
            background: #007bff;
            color: white;
        }

        .session-title {
            font-weight: 500;
            margin-bottom: 5px;
        }

        .session-meta {
            font-size: 12px;
            color: #6c757d;
        }

        .session-item.active .session-meta {
            color: rgba(255, 255, 255, 0.8);
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: between;
            align-items: center;
        }

        .chat-title {
            font-size: 20px;
            font-weight: 600;
            color: #343a40;
        }

        .memory-indicator {
            background: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: auto;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #007bff;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 5px;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .message.user .message-avatar {
            background: #007bff;
            order: 1;
        }

        .message.assistant .message-avatar {
            background: #28a745;
        }

        .message-timestamp {
            font-size: 11px;
            color: #6c757d;
            margin-top: 5px;
        }

        .memory-context {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            font-size: 12px;
        }

        .memory-context-title {
            font-weight: bold;
            margin-bottom: 5px;
            color: #856404;
        }        .memory-item {
            margin-bottom: 5px;
            padding: 5px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 4px;
        }

        .thinking-section {
            background: #f0f8ff;
            border: 1px solid #b0d4f1;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .thinking-header {
            font-weight: bold;
            color: #2c5aa0;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .thinking-content {
            color: #34495e;
            font-style: italic;
            line-height: 1.4;
            background: rgba(255, 255, 255, 0.7);
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid #3498db;
        }        .answer-section {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 0;
            border-radius: 4px;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e9ecef;
        }

        .chat-input-form {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 16px;
            resize: none;
            max-height: 120px;
            line-height: 1.4;
        }

        .chat-input:focus {
            outline: none;
            border-color: #007bff;
        }

        .send-btn {
            padding: 12px 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .send-btn:hover:not(:disabled) {
            background: #0056b3;
        }

        .send-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            padding: 10px 20px;
            color: #6c757d;
            font-style: italic;
        }

        .typing-indicator.show {
            display: block;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .status-indicator {
            padding: 10px;
            text-align: center;
            font-size: 12px;
            background: #d4edda;
            color: #155724;
        }

        .status-indicator.error {
            background: #f8d7da;
            color: #721c24;
        }

        @media (max-width: 768px) {
            .chat-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }

            .sidebar {
                width: 250px;
            }

            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Qwen Chat</h3>
                <button class="new-chat-btn" onclick="startNewSession()">+ New Chat</button>
            </div>
            <div class="sessions-list" id="sessions-list">
                <!-- Sessions will be loaded here -->
            </div>
        </div>

        <div class="main-chat">
            <div class="chat-header">
                <div class="chat-title">AI Assistant with Memory</div>
                <div class="memory-indicator" id="memory-indicator" style="display: none;">
                    Memory Active
                </div>
            </div>

            <div class="status-indicator" id="status-indicator">
                Connecting to AI...
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="message assistant">
                    <div class="message-avatar">Q</div>
                    <div class="message-content">
                        <div>Hello! I'm Qwen, your AI assistant with memory capabilities. I can remember our previous conversations and provide more personalized responses. How can I help you today?</div>
                        <div class="message-timestamp">Just now</div>
                    </div>
                </div>
            </div>

            <div class="typing-indicator" id="typing-indicator">
                AI is thinking...
            </div>

            <div class="chat-input-container">
                <form class="chat-input-form" id="chat-form">
                    <textarea 
                        class="chat-input" 
                        id="chat-input" 
                        placeholder="Type your message here..."
                        rows="1"
                        maxlength="2000"
                    ></textarea>
                    <button type="submit" class="send-btn" id="send-btn">Send</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        class QwenChat {
            constructor() {
                this.sessionId = '{{ session_id }}';
                this.isTyping = false;
                this.initializeElements();
                this.setupEventListeners();
                this.loadSessions();
                this.checkHealth();
            }

            initializeElements() {
                this.chatMessages = document.getElementById('chat-messages');
                this.chatInput = document.getElementById('chat-input');
                this.sendBtn = document.getElementById('send-btn');
                this.chatForm = document.getElementById('chat-form');
                this.typingIndicator = document.getElementById('typing-indicator');
                this.sessionsList = document.getElementById('sessions-list');
                this.statusIndicator = document.getElementById('status-indicator');
                this.memoryIndicator = document.getElementById('memory-indicator');
            }

            setupEventListeners() {
                this.chatForm.addEventListener('submit', (e) => this.handleSubmit(e));
                this.chatInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.handleSubmit(e);
                    }
                });
                
                // Auto-resize textarea
                this.chatInput.addEventListener('input', () => {
                    this.chatInput.style.height = 'auto';
                    this.chatInput.style.height = Math.min(this.chatInput.scrollHeight, 120) + 'px';
                });
            }

            async handleSubmit(e) {
                e.preventDefault();
                
                const message = this.chatInput.value.trim();
                if (!message || this.isTyping) return;

                this.addMessage('user', message);
                this.chatInput.value = '';
                this.chatInput.style.height = 'auto';
                this.setTyping(true);

                try {
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ message: message })
                    });                    const data = await response.json();

                    if (response.ok) {
                        this.addMessage('assistant', data.response, data.memories_used, data.thinking);
                        this.sessionId = data.session_id;
                        this.updateMemoryIndicator(data.memories_used);
                    } else {
                        this.showError(data.error || 'Failed to get response');
                    }
                } catch (error) {
                    this.showError('Network error: ' + error.message);
                } finally {
                    this.setTyping(false);
                }
            }            addMessage(role, content, memories = null, thinking = null) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${role}`;
                
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = role === 'user' ? 'U' : 'Q';
                
                const messageContent = document.createElement('div');
                messageContent.className = 'message-content';
                
                // Add thinking section if present (only for assistant)
                if (role === 'assistant' && thinking) {
                    const thinkingDiv = document.createElement('div');
                    thinkingDiv.className = 'thinking-section';
                    
                    const thinkingHeader = document.createElement('div');
                    thinkingHeader.className = 'thinking-header';
                    thinkingHeader.innerHTML = '🤔 Thinking...';
                    
                    const thinkingContent = document.createElement('div');
                    thinkingContent.className = 'thinking-content';
                    thinkingContent.textContent = thinking;
                    
                    thinkingDiv.appendChild(thinkingHeader);
                    thinkingDiv.appendChild(thinkingContent);
                    messageContent.appendChild(thinkingDiv);
                }
                
                const contentDiv = document.createElement('div');
                contentDiv.className = role === 'assistant' && thinking ? 'answer-section' : 'message-text';
                contentDiv.textContent = content;
                
                const timestamp = document.createElement('div');
                timestamp.className = 'message-timestamp';
                timestamp.textContent = new Date().toLocaleTimeString();
                
                messageContent.appendChild(contentDiv);
                messageContent.appendChild(timestamp);
                
                // Add memory context if available
                if (memories && memories.length > 0) {
                    const memoryContext = document.createElement('div');
                    memoryContext.className = 'memory-context';
                    
                    const memoryTitle = document.createElement('div');
                    memoryTitle.className = 'memory-context-title';
                    memoryTitle.textContent = `Referenced ${memories.length} past conversation(s):`;
                    memoryContext.appendChild(memoryTitle);
                    
                    memories.forEach(memory => {
                        const memoryItem = document.createElement('div');
                        memoryItem.className = 'memory-item';
                        memoryItem.textContent = `${memory.content} (${(memory.similarity * 100).toFixed(1)}% similar)`;
                        memoryContext.appendChild(memoryItem);
                    });
                    
                    messageContent.appendChild(memoryContext);
                }
                
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(messageContent);
                
                this.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            setTyping(isTyping) {
                this.isTyping = isTyping;
                this.sendBtn.disabled = isTyping;
                this.typingIndicator.classList.toggle('show', isTyping);
                if (isTyping) {
                    this.scrollToBottom();
                }
            }

            scrollToBottom() {
                this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
            }

            showError(message) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = message;
                this.chatMessages.appendChild(errorDiv);
                this.scrollToBottom();
            }

            updateMemoryIndicator(memories) {
                if (memories && memories.length > 0) {
                    this.memoryIndicator.style.display = 'block';
                    this.memoryIndicator.textContent = `${memories.length} memories used`;
                } else {
                    this.memoryIndicator.style.display = 'none';
                }
            }

            async loadSessions() {
                try {
                    const response = await fetch('/sessions');
                    const data = await response.json();
                    
                    if (response.ok) {
                        this.renderSessions(data.sessions);
                    }
                } catch (error) {
                    console.error('Failed to load sessions:', error);
                }
            }

            renderSessions(sessions) {
                this.sessionsList.innerHTML = '';
                
                sessions.forEach(session => {
                    const sessionDiv = document.createElement('div');
                    sessionDiv.className = 'session-item';
                    if (session.session_id === this.sessionId) {
                        sessionDiv.classList.add('active');
                    }
                    
                    sessionDiv.innerHTML = `
                        <div class="session-title">${session.title}</div>
                        <div class="session-meta">
                            ${session.message_count} messages • ${new Date(session.last_activity).toLocaleDateString()}
                        </div>
                    `;
                    
                    sessionDiv.addEventListener('click', () => {
                        this.loadSession(session.session_id);
                    });
                    
                    this.sessionsList.appendChild(sessionDiv);
                });
            }

            async loadSession(sessionId) {
                try {
                    const response = await fetch(`/history/${sessionId}`);
                    const data = await response.json();
                    
                    if (response.ok) {
                        this.sessionId = sessionId;
                        this.chatMessages.innerHTML = '';
                          data.messages.forEach(msg => {
                            this.addMessage(msg.role, msg.content, null, null);
                        });
                        
                        this.loadSessions(); // Refresh to update active session
                    }
                } catch (error) {
                    this.showError('Failed to load session');
                }
            }

            async checkHealth() {
                try {
                    const response = await fetch('/health');
                    const data = await response.json();
                    
                    if (response.ok && data.status === 'healthy') {
                        this.statusIndicator.textContent = 'Connected to AI ✓';
                        this.statusIndicator.className = 'status-indicator';
                        
                        // Hide status after 3 seconds
                        setTimeout(() => {
                            this.statusIndicator.style.display = 'none';
                        }, 3000);
                    } else {
                        this.statusIndicator.textContent = 'AI connection issues - some features may not work';
                        this.statusIndicator.className = 'status-indicator error';
                    }
                } catch (error) {
                    this.statusIndicator.textContent = 'Unable to connect to AI service';
                    this.statusIndicator.className = 'status-indicator error';
                }
            }
        }

        async function startNewSession() {
            try {
                const response = await fetch('/new_session', { method: 'POST' });
                const data = await response.json();
                
                if (response.ok) {
                    location.reload(); // Simple refresh to start new session
                }
            } catch (error) {
                console.error('Failed to start new session:', error);
            }
        }

        // Initialize the chat when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            new QwenChat();
        });
    </script>
</body>
</html>
