            <script>
                class QwenChat {
                    constructor() {
                        this.sessionId = '{{ session_id }}';
                        this.isTyping = false;
                        this.searchTimer = null;
                        this.initializeElements();
                        this.setupEventListeners();
                        this.loadSessions();
                        this.loadAttachments();
                        this.checkHealth();
                    }

                    initializeElements() {
                        this.chatMessages = document.getElementById('chat-messages');
                        this.chatInput = document.getElementById('chat-input');
                        this.sendBtn = document.getElementById('send-btn');
                        this.chatForm = document.getElementById('chat-form');
                        this.typingIndicator = document.getElementById('typing-indicator');
                        this.sessionsList = document.getElementById('sessions-list');
                        this.statusIndicator = document.getElementById('status-indicator');
                        this.memoryIndicator = document.getElementById('memory-indicator');
                        this.sessionSearch = document.getElementById('session-search');
                        this.exportBtn = document.getElementById('export-btn');
                        this.attachBtn = document.getElementById('attach-btn');
                        this.attachmentInput = document.getElementById('attachment-input');
                        this.attachmentList = document.getElementById('attachment-list');
                        this.uploadStatus = document.getElementById('upload-status');
                    }

                    setupEventListeners() {
                        this.chatForm.addEventListener('submit', (e) => this.handleSubmit(e));
                        this.exportBtn.addEventListener('click', () => this.exportCurrentChat());
                        this.attachBtn.addEventListener('click', () => this.attachmentInput.click());
                        this.attachmentInput.addEventListener('change', (e) => this.uploadAttachments(e));
                        this.sessionSearch.addEventListener('input', () => {
                            clearTimeout(this.searchTimer);
                            this.searchTimer = setTimeout(() => {
                                this.loadSessions(this.sessionSearch.value.trim());
                            }, 250);
                        });
                        this.chatInput.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter' && !e.shiftKey) {
                                e.preventDefault();
                                this.handleSubmit(e);
                            }
                        });
                        this.chatInput.addEventListener('input', () => {
                            this.chatInput.style.height = 'auto';
                            this.chatInput.style.height = Math.min(this.chatInput.scrollHeight, 120) + 'px';
                        });
                    }

            async loadSessions(query = '') {
                try {
                    const response = await fetch(`/sessions?q=${encodeURIComponent(query)}`);
                    const data = await response.json();

                    if (response.ok) {
                        this.renderSessions(data.sessions);
                    }
                } catch (error) {
                    console.error('Failed to load sessions:', error);
                }
            }

            renderSessions(sessions) {
                this.sessionsList.innerHTML = '';

                sessions.forEach(session => {
                    const sessionDiv = document.createElement('div');
                    sessionDiv.className = 'session-item';
                    if (session.session_id === this.sessionId) {
                        sessionDiv.classList.add('active');
                    }

                    const body = document.createElement('div');
                    body.className = 'session-item-body';

                    const header = document.createElement('div');
                    header.className = 'session-item-header';

                    const textBlock = document.createElement('div');

                    const title = document.createElement('div');
                    title.className = 'session-title';
                    title.textContent = session.title || 'New Chat';

                    const meta = document.createElement('div');
                    meta.className = 'session-meta';
                    meta.textContent = `${session.message_count} messages • ${new Date(session.last_activity).toLocaleDateString()}`;

                    textBlock.appendChild(title);
                    textBlock.appendChild(meta);

                    if (session.snippet) {
                        const snippet = document.createElement('div');
                        snippet.className = 'session-snippet';
                        snippet.textContent = session.snippet;
                        textBlock.appendChild(snippet);
                    }

                    const actions = document.createElement('div');
                    actions.className = 'session-actions';

                    const renameButton = document.createElement('button');
                    renameButton.type = 'button';
                    renameButton.className = 'session-action-btn';
                    renameButton.title = 'Rename chat';
                    renameButton.textContent = '✎';
                    renameButton.addEventListener('click', (event) => {
                        event.stopPropagation();
                        this.renameSession(session.session_id, session.title || 'New Chat');
                    });

                    const deleteButton = document.createElement('button');
                    deleteButton.type = 'button';
                    deleteButton.className = 'session-action-btn';
                    deleteButton.title = 'Delete chat';
                    deleteButton.textContent = '×';
                    deleteButton.addEventListener('click', (event) => {
                        event.stopPropagation();
                        this.deleteSession(session.session_id);
                    });

                    actions.appendChild(renameButton);
                    actions.appendChild(deleteButton);

                    header.appendChild(textBlock);
                    header.appendChild(actions);
                    body.appendChild(header);
                    sessionDiv.appendChild(body);

                    sessionDiv.addEventListener('click', () => {
                        this.loadSession(session.session_id);
                    });

                    this.sessionsList.appendChild(sessionDiv);
                });
            }

            async renameSession(sessionId, currentTitle) {
                const nextTitle = window.prompt('Rename chat', currentTitle);
                if (nextTitle === null) {
                    return;
                }

                const cleanedTitle = nextTitle.trim();
                if (!cleanedTitle) {
                    return;
                }

                try {
                    const response = await fetch(`/sessions/${sessionId}/rename`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ title: cleanedTitle })
                    });

                    if (response.ok) {
                        await this.loadSessions(this.sessionSearch.value.trim());
                    } else {
                        const data = await response.json();
                        this.showError(data.error || 'Failed to rename chat');
                    }
                } catch (error) {
                    this.showError('Failed to rename chat');
                }
            }

            async deleteSession(sessionId) {
                const confirmed = window.confirm('Delete this chat and all of its messages?');
                if (!confirmed) {
                    return;
                }

                try {
                    const response = await fetch(`/sessions/${sessionId}`, {
                        method: 'DELETE'
                    });

                    if (response.ok) {
                        const data = await response.json();
                        if (data.new_session_id) {
                            location.reload();
                            return;
                        }

                        await this.loadSessions(this.sessionSearch.value.trim());
                    } else {
                        const data = await response.json();
                        this.showError(data.error || 'Failed to delete chat');
                    }
                } catch (error) {
                    this.showError('Failed to delete chat');
                }
            }

            async exportCurrentChat() {
                try {
                    const response = await fetch(`/export/${this.sessionId}?format=markdown`);
                    if (!response.ok) {
                        const data = await response.json();
                        this.showError(data.error || 'Failed to export chat');
                        return;
                    }

                    const blob = await response.blob();
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = downloadUrl;
                    link.download = `session-${this.sessionId}.md`;
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                    window.URL.revokeObjectURL(downloadUrl);
                } catch (error) {
                    this.showError('Failed to export chat');
                }
            }

            async loadSession(sessionId) {
                try {
                    const response = await fetch(`/history/${sessionId}`);
                    const data = await response.json();

                    if (response.ok) {
                        this.sessionId = sessionId;
                        this.chatMessages.innerHTML = '';
                        data.messages.forEach(msg => {
                            this.addMessage(msg.role, msg.content, null, null);
                        });

                        this.loadSessions(this.sessionSearch.value.trim());
                    }
                } catch (error) {
                    this.showError('Failed to load session');
                }
            }

            createStreamingAssistantMessage() {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message assistant';

                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = 'Q';

                const messageContent = document.createElement('div');
                messageContent.className = 'message-content';

                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-markdown streaming-message';
                contentDiv.textContent = '';

                const timestamp = document.createElement('div');
                timestamp.className = 'message-timestamp';
                timestamp.textContent = 'Just now';

                messageContent.appendChild(contentDiv);
                messageContent.appendChild(timestamp);
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(messageContent);
                this.chatMessages.appendChild(messageDiv);
                this.scrollToBottom();

                return {
                    messageDiv,
                    messageContent,
                    contentDiv,
                    timestamp
                };
            }

            async consumeStreamResponse(response, streamingAssistant) {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let streamedText = '';
                let finalPayload = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        break;
                    }

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.trim()) {
                            continue;
                        }

                        let payload = null;
                        try {
                            payload = JSON.parse(line);
                        } catch (error) {
                            continue;
                        }

                        if (payload.type === 'chunk') {
                            streamedText += payload.content || '';
                            streamingAssistant.contentDiv.innerHTML = this.renderMarkdown(streamedText);
                            this.scrollToBottom();
                            continue;
                        }

                        if (payload.type === 'done') {
                            finalPayload = payload;
                            continue;
                        }

                        if (payload.type === 'error') {
                            throw new Error(payload.error || 'Failed to generate response');
                        }
                    }
                }

                if (buffer.trim()) {
                    try {
                        const payload = JSON.parse(buffer.trim());
                        if (payload.type === 'done') {
                            finalPayload = payload;
                        }
                    } catch (error) {
                        // Ignore trailing partial buffer
                    }
                }

                if (!finalPayload) {
                    finalPayload = {
                        response: streamedText,
                        thinking: '',
                        session_id: this.sessionId,
                        memories_used: []
                    };
                }

                this.finishStreamingAssistantMessage(streamingAssistant, finalPayload.response || streamedText, finalPayload.thinking || '', finalPayload.memories_used || []);
                this.sessionId = finalPayload.session_id || this.sessionId;
                this.updateMemoryIndicator(finalPayload.memories_used || []);
                this.loadSessions(this.sessionSearch.value.trim());
            }

            finishStreamingAssistantMessage(streamingAssistant, responseText, thinking, memories) {
                const messageContent = streamingAssistant.messageContent;
                messageContent.innerHTML = '';

                if (thinking) {
                    const thinkingDiv = document.createElement('div');
                    thinkingDiv.className = 'thinking-section';

                    const thinkingHeader = document.createElement('div');
                    thinkingHeader.className = 'thinking-header';
                    thinkingHeader.innerHTML = '🤔 Thinking...';

                    const thinkingContent = document.createElement('div');
                    thinkingContent.className = 'thinking-content';
                    thinkingContent.textContent = thinking;

                    thinkingDiv.appendChild(thinkingHeader);
                    thinkingDiv.appendChild(thinkingContent);
                    messageContent.appendChild(thinkingDiv);
                }

                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-markdown';
                contentDiv.innerHTML = this.renderMarkdown(responseText);

                const timestamp = document.createElement('div');
                timestamp.className = 'message-timestamp';
                timestamp.textContent = new Date().toLocaleTimeString();

                messageContent.appendChild(contentDiv);
                messageContent.appendChild(timestamp);

                const actions = document.createElement('div');
                actions.className = 'message-actions';

                const copyButton = document.createElement('button');
                copyButton.type = 'button';
                copyButton.className = 'copy-btn';
                copyButton.textContent = 'Copy';
                copyButton.addEventListener('click', async () => {
                    try {
                        await navigator.clipboard.writeText(responseText);
                        copyButton.textContent = 'Copied';
                        setTimeout(() => {
                            copyButton.textContent = 'Copy';
                        }, 1200);
                    } catch (error) {
                        console.error('Failed to copy message:', error);
                    }
                });

                actions.appendChild(copyButton);
                messageContent.appendChild(actions);

                if (memories && memories.length > 0) {
                    const memoryContext = document.createElement('div');
                    memoryContext.className = 'memory-context';

                    const memoryTitle = document.createElement('div');
                    memoryTitle.className = 'memory-context-title';
                    memoryTitle.textContent = `Referenced ${memories.length} past conversation(s):`;
                    memoryContext.appendChild(memoryTitle);

                    memories.forEach(memory => {
                        const memoryItem = document.createElement('div');
                        memoryItem.className = 'memory-item';
                        memoryItem.textContent = `${memory.content} (${(memory.similarity * 100).toFixed(1)}% similar)`;
                        memoryContext.appendChild(memoryItem);
                    });

                    messageContent.appendChild(memoryContext);
                }
            }

            async uploadAttachments(event) {
                const files = Array.from(event.target.files || []);
                if (!files.length) {
                    return;
                }

                const formData = new FormData();
                files.forEach(file => formData.append('files', file));

                this.uploadStatus.textContent = 'Uploading...';

                try {
                    const response = await fetch('/attachments/upload', {
                        method: 'POST',
                        body: formData
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        this.uploadStatus.textContent = data.error || 'Failed to upload files';
                        return;
                    }

                    const uploadedCount = data.uploaded ? data.uploaded.length : 0;
                    const rejectedCount = data.rejected ? data.rejected.length : 0;
                    this.uploadStatus.textContent = `${uploadedCount} file(s) attached${rejectedCount ? `, ${rejectedCount} rejected` : ''}`;
                    this.attachmentInput.value = '';
                    await this.loadAttachments();
                } catch (error) {
                    this.uploadStatus.textContent = 'Failed to upload files';
                }
            }

            async loadAttachments() {
                try {
                    const response = await fetch(`/attachments?session_id=${encodeURIComponent(this.sessionId)}`);
                    const data = await response.json();

                    if (response.ok) {
                        this.renderAttachments(data.attachments || []);
                    }
                } catch (error) {
                    console.error('Failed to load attachments:', error);
                }
            }

            renderAttachments(attachments) {
                this.attachmentList.innerHTML = '';

                if (!attachments.length) {
                    const empty = document.createElement('div');
                    empty.className = 'attachment-empty';
                    empty.textContent = 'No files attached to this chat yet.';
                    this.attachmentList.appendChild(empty);
                    return;
                }

                attachments.forEach(attachment => {
                    const item = document.createElement('div');
                    item.className = 'attachment-item';

                    const info = document.createElement('div');
                    const title = document.createElement('strong');
                    title.textContent = attachment.filename;
                    const meta = document.createElement('div');
                    meta.className = 'attachment-meta';
                    meta.textContent = `${this.formatFileSize(attachment.size || 0)} • attached`;
                    info.appendChild(title);
                    info.appendChild(meta);

                    item.appendChild(info);
                    this.attachmentList.appendChild(item);
                });
            }

            formatFileSize(bytes) {
                if (bytes < 1024) {
                    return `${bytes} B`;
                }
                if (bytes < 1024 * 1024) {
                    return `${(bytes / 1024).toFixed(1)} KB`;
                }
                return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
            }
            new QwenChat();
        });
    </script>
</body>
